services:

  # ─── PHP-FPM (Laravel) ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
      - .docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - quiz
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - quiz
    depends_on:
      - app

  # ─── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-quiz_app}
      MYSQL_USER: ${DB_USERNAME:-quiz_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-quiz_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - quiz
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - quiz

  # ─── Queue Worker ─────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
      - .docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - quiz
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── Laravel Reverb (WebSocket) ───────────────────────────────────────────
  # Activer après : composer require laravel/reverb && php artisan reverb:install
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    ports:
      - "${REVERB_PORT:-8080}:8080"
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
      - .docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - quiz
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    profiles:
      - reverb

  # ─── Vite Dev Server (dev uniquement) ─────────────────────────────────────
  vite:
    image: node:20-alpine
    working_dir: /var/www
    command: npm run dev
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www
      - /var/www/node_modules
    networks:
      - quiz
    profiles:
      - dev

networks:
  quiz:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  vendor:
